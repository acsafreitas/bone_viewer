<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Visualizador 3D Ósseo</title>

  <!-- ESSENCIAL para mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    /* Viewer ocupa tudo */
    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: black;
    }

    /* Container dos botões */
    .controls {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 10px;
      z-index: 9999;
      flex-wrap: wrap; /* importante para mobile */
    }

    /* Botões */
    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: rgba(30,30,30,0.8);
      color: white;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }

    button.active {
      background: #0a84ff;
    }

    /* 📱 MOBILE */
    @media (max-width: 600px) {
      .controls {
        top: auto;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        justify-content: center;
      }

      button {
        font-size: 16px;
        padding: 12px 18px;
      }
    }
  </style>
</head>

<body>

  <!-- Botões -->
  <div class="controls">
    <button onclick="loadModel('Segmentation.glb', this)">Pé 2</button>
    <button onclick="loadModel('foot__ankle.glb', this)">Pé</button>
  </div>

  <!-- Viewer -->
  <model-viewer
    id="viewer"
    src="Segmentation.glb"
    camera-controls
    auto-rotate
    exposure="1.2"
    shadow-intensity="1"
    environment-image="neutral"
    alt="Modelo ósseo 3D">
  </model-viewer>

  <script>
    function loadModel(file, btn) {
      const viewer = document.getElementById("viewer");
      viewer.setAttribute("src", file);

      document.querySelectorAll("button").forEach(b => {
        b.classList.remove("active");
      });

      btn.classList.add("active");
    }
  </script>

</body>
</html>
