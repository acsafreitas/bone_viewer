<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Visualizador 3D Ósseo</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial, sans-serif;
      color: white;
    }

    /* Área dos botões */
    .controls {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #222;
      color: white;
      font-size: 14px;
      transition: 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    button:hover {
      background: #444;
      transform: scale(1.05);
    }

    button.active {
      background: #0a84ff;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: black;
    }
  </style>
</head>

<body>

  <!-- Botões -->
  <div class="controls">
    <button onclick="loadModel('Segmentation.glb', this)">Pé2</button>
    <button onclick="loadModel('foot__ankle.glb', this)">Pé</button>
  </div>

  <!-- Viewer -->
  <model-viewer
    id="viewer"
    src="Segmentation.glb"
    camera-controls
    auto-rotate
    exposure="1.2"
    shadow-intensity="1"
    environment-image="neutral"
    alt="Modelo ósseo 3D">
  </model-viewer>

  <script>
    function loadModel(file, btn) {
      const viewer = document.getElementById("viewer");
      viewer.setAttribute("src", file);

      // remover destaque de todos os botões
      document.querySelectorAll("button").forEach(b => {
        b.classList.remove("active");
      });

      // destacar botão clicado
      btn.classList.add("active");
    }
  </script>

</body>
</html>
