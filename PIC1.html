<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Visualizador 3D Ósseo</title>
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>
  <style>
    body { margin: 0; background: black; }
    model-viewer { width: 100vw; height: 100vh; background-color: black; }
  </style>
</head>
<body>
  <!-- Modelo exportado do Slicer -->
  <model-viewer
    src="Segmentation.glb"
    camera-controls
    auto-rotate
    exposure="1.2"
    shadow-intensity="1"
    environment-image="neutral"
    alt="Modelo ósseo 3D">
  </model-viewer>
</body>
</html>
